apiVersion: apps/v1
kind: Deployment
metadata:
  name: kulonut-fe-vizsgaremek
  labels:
    app.kubernetes.io/name: kulonut-vizsgaremek
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kulonut-fe-vizsgaremek
  template:
    metadata:
      labels:
        app: kulonut-fe-vizsgaremek
    spec:
      containers:
        - name: github-action-container
          image: ghcr.io/megadrive88/kulonut-fe-vizsgaremek:1775137861
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: ghcr-auth-token

---

apiVersion: v1
kind: Service
metadata:
  name: kulonut-fe-vizsgaremek-service
  labels:
    app.kubernetes.io/name: kulonut-vizsgaremek
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: kulonut-fe-vizsgaremek
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kulonut-vizsgaremek-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kulonut-vizsgaremek.jcloud.jedlik.cloud
      secretName: kulonut-vizsgaremek-certificate
  rules:
    - host: kulonut-vizsgaremek.jcloud.jedlik.cloud


---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kulonut-vizsgaremek-certificate
  labels:
    app.kubernetes.io/name: kulonut-vizsgaremek
spec:
  secretName: kulonut-vizsgaremek-certificate
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - kulonut-vizsgaremek.jcloud.jedlik.cloud