<app-top-bar-component/>
<div class="content fancy-border d-flex vertical-box mx-3" style="gap: 25px; max-width: 100%;">
    
    <div class="row g-0">
        <form class="col-12 col-lg-7 p-0" [formGroup]="project_form" (submit)="SubmitProjectData()">
            <div class="pe-3">
                <div class="d-flex white-panel g-0 gap-3" style="width: 100%; height: 60px;">
                    <h3 style="white-space: nowrap;">Projekt neve:</h3>
                    <input type="text" class="form-control" formControlName="project_name">
                </div>
                <div class="white-panel row g-0" style="height: 650px;">
                    <div class="col-6 pe-3">
                        <div class="row">
                            <div class="col-5 d-flex vertical-box" style="gap: 10px; margin-top: 10px;">
                                <h5>Tervező</h5>
                                <h5>Generáltervező</h5>
                                <h5>Geodézia</h5>
                                <h5>Megrendelő</h5>
                            </div>
                            <div class="col-7 d-flex vertical-box" style="gap: 5px;">
                                @for (item of selectFields; track $index) {
                                    <ng-select
                                        [items]="(item.items$| async) ?? []"
                                        bindLabel="name"
                                        bindValue="name"
                                        [addTag]="true"
                                        [trackByFn]="trackByFn"
                                        [minTermLength]="2"
                                        typeToSearchText="Válasszon, vagy kezdejen el gépelni"
                                        [formControlName]="item.control"
                                        >
                                    </ng-select>
                                }
                            </div>
                        </div>
                        <hr>
                        <div class="row">
                            <div class="col-5 d-flex vertical-box" style="gap: 10px; margin-top: 10px;">
                                <h5>Egyéb munkarészek</h5>
                                <h5>Iratpapucs száma</h5>
                                <h5>Munkaszám</h5>
                            </div>
                            <div class="col-7 d-flex vertical-box" style="gap: 5px;">
                                <input type="text" class="form-control" formControlName="other_work_parts" maxlength="255">
                                <input type="text" class="form-control" formControlName="folder_number" maxlength="100">
                                <input type="text" class="form-control" formControlName="work_number" maxlength="100">
                            </div>
                        </div>
                        <hr>
                        <h5>Megjegyzés</h5>
                        <textarea style="padding-bottom: auto;" maxlength="255" class="form-control" formControlName="notes"></textarea>
                    </div>
                    <div class="col-6 row vertical-box" id="datepicker-panel" style="align-items: flex-start; gap: 15px; padding-right: 0;">
                        @for (item of dateFields; track $index){
                            <div>
                                <h5>{{item.title}}</h5>
                                <input type="date" class="form-control" [formControlName]="item.control">
                            </div>
                        }
                        <hr>
                        <ul id="checkboxes">
                            @for (item of checkFields; track $index) {
                                <li>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" [formControlName]="item.control" [id]="item.control">
                                        <label class="form-check-label" [for]="item.control">
                                            {{item.title}}
                                        </label>
                                    </div>
                                </li>
                            }
                        </ul>
                        <hr>
                        <div>
                            <label for="uploadFile">Polygonok feltöltése TXT formában</label>
                            <div class="d-flex gap-2">
                                <input id="uploadFile" type="file" class="form-control" accept=".txt">
                                <button type="button" matButton="filled" class="blue-form-button" style="max-height: 37px;">Feltöltés</button>
                            </div>
                        </div>
                    </div>
                    <button style="margin-top: auto;" type="submit" matButton="filled" class="blue-form-button fancy-border">{{mode == "new" ? "Rögzít" : "Mentés"}}</button>
                </div>
            </div>
        </form>
        <div class="col-12 col-lg-5">
            <div class="ps-3 d-flex vertical-box white-panel" style="height: 710px;">
                <div id="map" class="fancy-border" style="border: 1px solid black;">
                    <app-map-component [readonly]="false"/>
                </div>
                <button matButton="filled" style="margin-top: 15px;" class="fancy-border" id="save-map">Poligonok mentése</button>
            </div>
        </div>
    </div>
</div>
