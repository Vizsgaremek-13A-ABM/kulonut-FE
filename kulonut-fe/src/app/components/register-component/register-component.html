<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Regisztráció</h1>
  <form class="vertical-box fancy-border gap-3" (ngSubmit)="sendRegisterData()" [formGroup]="form">
    <img src="/assets/logo.png" alt="">
    <app-form-field-component
        label="Felhasználónév"
        controlName="name"
        [form]="form"
    />
    <app-form-field-component
        label="E-mail cím"
        controlName="email"
        [form]="form"
        type="email"
    />
    <app-form-field-component
        label="Jelszó"
        controlName="password"
        [form]="form"
        type="password"
    />
    <app-form-field-component
        label="Jelszó újra"
        controlName="password_confirmation"
        [form]="form"
        type="password"
    />
    <button [disabled]="form.invalid" matButton="filled" class="wide fancy-border mt-2 blue-form-button" type="submit">Regisztráció</button>
    <a [routerLink]="['']" style="width: fit-content;">Már van fiókja?</a>
  </form>
</div>
