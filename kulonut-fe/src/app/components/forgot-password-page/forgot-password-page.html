<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
    <h1>Elfelejtett jelszó</h1>
    <form class="vertical-box fancy-border gap-3" (submit)="send()">
        <img src="/assets/logo.png" alt="">
        <app-form-field-component
            data-cy="email"
            label="E-mail cím"
            controlName="email"
            type="email"
            [form]="form"
        />
        <button data-cy="email-send" matButton="filled" class="wide fancy-border mt-2 blue-form-button" type="submit">Küldés</button>
    </form>
</div>
