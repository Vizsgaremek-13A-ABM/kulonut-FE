<div [formGroup]="form">
    <label for="{{controlName}}" [className]="required ? 'mandatory-star' : ''">{{label}}</label>
    <input aria-label="{{label}}" aria-autocomplete="{{controlName}}" autocomplete="{{controlName}}" [required]="required" [formControlName]="controlName" [name]="controlName" [type]="type" class="form-control fancy-border" placeholder="{{label}}">
</div>
