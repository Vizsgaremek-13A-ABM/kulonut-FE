<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Jelszó visszaállítás</h1>
  <form class="fancy-border gap-3" [formGroup]="form" (ngSubmit)="send()">
    <fieldset [disabled]="!ready" class="vertical-box gap-3">
    <img src="/assets/logo.png" alt="">
    <app-form-field-component
        data-cy="password"
        label="Jelszó"
        controlName="password"
      [type]="passwordFieldType"
        [form]="form"
    />
    <app-form-field-component
        data-cy="password_confirmation"
        label="Jelszó újra"
        controlName="password_confirmation"
      [type]="passwordFieldType"
        [form]="form"
    />
    <div class="d-flex" style="width: 100%; gap: 25px;">
      <button [disabled]="form.invalid" matButton="filled" class="fancy-border blue-form-button" style="width: 100%;" type="submit">Küldés</button>
      <app-password-eye-toggle-component [disabled]="!ready" (toggled)="onPasswordVisibilityToggled($event)"></app-password-eye-toggle-component>
    </div>
    <div>
        <a [routerLink]="['/']" style="width: fit-content;">Vissza a bejelentkezéshez</a>
    </div>
    </fieldset>
  </form>
</div>
