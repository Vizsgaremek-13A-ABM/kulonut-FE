<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Jelszó visszaállítás</h1>
  <form class="vertical-box fancy-border gap-3" [formGroup]="form" (ngSubmit)="send()">
    <img src="/assets/logo.png" alt="">
    <app-form-field-component
        data-cy="password"
        label="Jelszó"
        controlName="password"
        type="password"
        [form]="form"
    />
    <app-form-field-component
        data-cy="password_confirmation"
        label="Jelszó újra"
        controlName="password_confirmation"
        type="password"
        [form]="form"
    />
    <button [disabled]="form.invalid" matButton="filled" class="wide fancy-border mt-2 blue-form-button" type="submit">Küldés</button>
    <!-- eye button -->
    <div>
        <a [routerLink]="['/']" style="width: fit-content;">Vissza a bejelentkezéshez</a>
    </div>
  </form>
</div>
