<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Bejelentkezés</h1>
  <form class="vertical-box fancy-border gap-3" (ngSubmit)="sendLoginData()">
    <div>
      <label for="username">Felhasználónév</label>
      <input name="username" type="text" class="form-control fancy-border" placeholder="Felhasználónév" [(ngModel)]="loginModel.username">
    </div>
    <div>
      <label for="password">Jelszó</label>
      <input name="password" type="password" class="form-control fancy-border" placeholder="Jelszó" [(ngModel)]="loginModel.password">
    </div>
    <button matButton="filled" class="wide fancy-border mt-2" type="submit">Bejelentkezés</button>
    <a [routerLink]="['/user_register']">Nincs még fiókja?</a>
  </form>
</div>
