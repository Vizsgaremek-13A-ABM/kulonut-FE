<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Bejelentkezés</h1>
  <form class="vertical-box fancy-border gap-3" (ngSubmit)="sendLoginData()" [formGroup]="form">
    <img src="/assets/logo.png" alt="">
    <app-form-field-component
        data-cy="email"
        label="E-mail cím"
        controlName="email"
        type="email"
        [form]="form"
    />
    <app-form-field-component
        data-cy="password"
        label="Jelszó"
        controlName="password"
        type="password"
        [form]="form"
    />
    <div>
      <div class="form-check">
        <input data-cy="rememberMe" class="form-check-input" type="checkbox" value="" id="rememberMeCheckbox" [formGroup]="form" formControlName="rememberMe">
        <label class="form-check-label" for="rememberMeCheckbox">
          Maradok bejelentkezve
        </label>
      </div>
      <button data-cy="login-submit" matButton="filled" class="wide fancy-border mt-2 blue-form-button" type="submit">Bejelentkezés</button>
    </div>
    <div>
      <a [routerLink]="['/user_register']" data-cy="register" style="width: fit-content;">Nincs még fiókja?</a>
      /
      <a [routerLink]="['/']" data-cy="password-reset" style="width: fit-content;">Elfelejtett jelszó</a>
    </div>
  </form>
</div>
