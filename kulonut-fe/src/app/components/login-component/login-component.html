<div class="g-0 col-10 col-md-6 col-xl-4 mx-auto my-5">
  <h1>Bejelentkezés</h1>
  <form class="vertical-box fancy-border gap-3" (ngSubmit)="sendLoginData()" [formGroup]="form">
    <app-form-field-component
        label="Felhasználónév"
        controlName="username"
        [form]="form"
    />
    <app-form-field-component
        label="Jelszó"
        controlName="password"
        type="password"
        [form]="form"
    />
    <button matButton="filled" class="wide fancy-border mt-2" type="submit">Bejelentkezés</button>
    <a [routerLink]="['/user_register']">Nincs még fiókja?</a>
  </form>
</div>
